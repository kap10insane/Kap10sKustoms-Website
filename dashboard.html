<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="dashboard-page">
    <section class="dashboard-shell">
      <div class="dashboard-header">
        <div>
          <p class="eyebrow">Owner Dashboard</p>
          <h1>Kap10's Kustoms Dashboard</h1>
        </div>

        <a class="btn secondary" href="index.html">Back to Site</a>
      </div>

      <section class="dashboard-panel">
        <div class="dashboard-panel-header">
          <div>
            <h2>Products</h2>
            <p>Manage store products from one place.</p>
          </div>

          <button class="btn primary" type="button">
            + New Product
          </button>
        </div>

        <div id="dashboardProducts" class="dashboard-products">
          Loading products...
        </div>
      </section>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
