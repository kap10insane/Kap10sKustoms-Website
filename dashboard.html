<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="dashboard-page">
    <section class="dashboard-shell">
      <div class="dashboard-header">
        <div>
          <p class="eyebrow">Owner Dashboard</p>
          <h1>Product Manager</h1>
        </div>

        <div class="dashboard-header-actions">
  <a class="btn secondary" href="index.html">Back to Site</a>
  <button class="btn secondary" type="button" id="logoutBtn">Logout</button>
</div>
      </div>

      <div class="dashboard-tabs">
  <button type="button" class="dashboard-tab active" data-dashboard-tab="products">
    Products
  </button>
  <button type="button" class="dashboard-tab" data-dashboard-tab="categories">
    Categories
  </button>
  <button type="button" class="dashboard-tab" data-dashboard-tab="platforms">
    Platforms
  </button>
  <button type="button" class="dashboard-tab" data-dashboard-tab="purchase-types">
    Purchase Types
  </button>
</div>

      <section class="dashboard-panel dashboard-tab-panel active" data-dashboard-panel="products">
        <div class="dashboard-panel-header">
          <div>
            <h2>Products</h2>
            <p>Manage store products from one place.</p>
          </div>

         <button class="btn primary" type="button" id="newProductBtn">
  + New Product
</button>
                </div>

        <div class="dashboard-product-filters">
          <button type="button" class="btn secondary product-filter-btn" data-filter="active">
            Active
          </button>

          <button type="button" class="btn secondary product-filter-btn" data-filter="archived">
            Archived
          </button>

          <button type="button" class="btn secondary product-filter-btn" data-filter="all">
            All
          </button>
        </div>

        <div id="dashboardProducts" class="dashboard-products">
          Loading products...
        </div>

        <form id="productForm" class="dashboard-form hidden">
  <h2>New Product</h2>

  <label>
    Product ID
    <input name="id" type="text" placeholder="pizzster389-blue-collar" required>
  </label>

  <label>
    Name
    <input name="name" type="text" placeholder="Blue Collar" required>
  </label>

  <label>
    Slug
    <input name="slug" type="text" placeholder="blue-collar" required>
  </label>

  <label>
  Category
  <select name="category" id="productCategorySelect" required>
    <option value="">Loading categories...</option>
  </select>
</label>

  <label>
    Price
    <input name="price" type="number" step="0.01" min="0" placeholder="4.99" required>
  </label>

  <label>
    Version
    <input name="version" type="text" placeholder="1.55+">
  </label>

  <label>
  Truck Folder
  <input name="truck_folder" type="text" placeholder="Pizzster389">
</label>

<label>
  Product Image Folder
  <input name="image_folder" type="text" placeholder="Blue collar">
</label>

 <label>
  Download File
  <input name="download_file" type="text" placeholder="ats/skins/Pizzster 389/Blue Collar.scs">
</label>

  <label>
    Description
    <textarea name="description" rows="5" placeholder="Product description..." required></textarea>
  </label>

  <label class="checkbox-row">
    <input name="active" type="checkbox" checked>
    Active / Published
  </label>

  <div class="dashboard-form-actions">
    <button class="btn primary" type="submit">Save Product</button>
    <button class="btn secondary" type="button" id="cancelProductBtn">Cancel</button>
  </div>
</form>

      </section>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
