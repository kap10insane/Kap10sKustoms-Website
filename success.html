<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="success-page success-shell">
    <section class="success-card">
      <div class="success-icon">✓</div>

      <p class="success-eyebrow">Purchase Complete</p>
      <h1>Thank you for supporting Kap10's Kustoms.</h1>

      <p id="purchaseStatus" class="success-status">
        Verifying your payment...
      </p>

      <div id="purchaseDetails" class="success-details"></div>

      <div class="success-actions">
        <a class="btn secondary" id="continueShoppingLink" href="ats.html">
  Continue Shopping
</a>
        <a class="btn secondary" href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <script>
  const API_BASE =
    "https://kap10skustoms-api.kap10skustoms.workers.dev";

  function productPrice(product) {
    return Number(product.price || 0).toFixed(2);
  }

  function productImage(product) {
    return (
      product.image ||
      product.image_url ||
      "images/kap10-logo-round.png"
    );
  }

  function formatFulfillmentStatus(status) {
    return String(status || "")
      .replaceAll("_", " ")
      .replace(/\b\w/g, (letter) => letter.toUpperCase());
  }

  async function verifyPurchase() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    const statusEl = document.getElementById("purchaseStatus");
    const detailsEl = document.getElementById("purchaseDetails");
    const continueShoppingLink = document.getElementById(
      "continueShoppingLink"
    );

    if (!sessionId) {
      statusEl.textContent =
        "Payment completed, but no session ID was found.";
      return;
    }

    try {
      const response = await fetch(
        `${API_BASE}/checkout-session?session_id=${encodeURIComponent(
          sessionId
        )}`
      );

      const data = await response.json();

      if (!response.ok || !data.ok || !data.session) {
        statusEl.textContent =
          "We could not verify this purchase yet.";
        return;
      }

      const session = data.session;

      if (session.payment_status !== "paid") {
        statusEl.textContent = "Payment was not completed.";
        return;
      }

      const productType =
        session.product_type === "physical"
          ? "physical"
          : "digital";

      if (productType === "physical") {
        continueShoppingLink.href = "physical.html";

        statusEl.textContent =
          "Your payment has been verified and your order is now awaiting fulfillment.";

        const shippingLocation = [
          session.shipping_city,
          session.shipping_state,
          session.shipping_postal_code
        ]
          .filter(Boolean)
          .join(", ");

        detailsEl.innerHTML = `
          <div class="order-summary polished-order-summary">

            <h2>${session.product_name}</h2>

            <p>
              <strong>Email:</strong>
              ${session.customer_email || "Not provided"}
            </p>

            <p>
              <strong>Total:</strong>
              $${(Number(session.amount_total || 0) / 100).toFixed(2)}
              ${String(session.currency || "usd").toUpperCase()}
            </p>

            <p>
              <strong>Order Status:</strong>
              ${formatFulfillmentStatus(
                session.fulfillment_status ||
                "awaiting_fulfillment"
              )}
            </p>

            ${
              session.shipping_name
                ? `
                  <hr>

                  <h3>Shipping Destination</h3>

                  <p>
                    <strong>${session.shipping_name}</strong>
                  </p>

                  ${
                    shippingLocation
                      ? `<p>${shippingLocation}</p>`
                      : ""
                  }

                  ${
                    session.shipping_country
                      ? `<p>${session.shipping_country}</p>`
                      : ""
                  }
                `
                : ""
            }

            <hr>

            <p>
              Your order has been received. You will receive another
              email when it has been shipped.
            </p>

          </div>

          <section class="might-like">

            <h3>You Might Also Like</h3>

            <div id="relatedProducts" class="related-products">
              <p class="loading-text">
                Loading recommendations...
              </p>
            </div>

          </section>
        `;

        loadRelatedProducts(
          session.product_id,
          "physical"
        );

        return;
      }

      continueShoppingLink.href = "ats.html";

      statusEl.textContent =
        "Your payment has been verified and your download is ready below.";

      detailsEl.innerHTML = `
        <div class="order-summary polished-order-summary">

          <h2>${session.product_name}</h2>

          <p>
            <strong>Email:</strong>
            ${session.customer_email || "Not provided"}
          </p>

          <p>
            <strong>Total:</strong>
            $${(Number(session.amount_total || 0) / 100).toFixed(2)}
            ${String(session.currency || "usd").toUpperCase()}
          </p>

          <p>
            <strong>Downloads Used:</strong>
            ${session.download_count ?? 0}
          </p>

          <p>
            <strong>Download Expires:</strong>
            ${
              session.download_expires
                ? new Date(
                    session.download_expires
                  ).toLocaleDateString()
                : "Not available"
            }
          </p>

          <br>

          ${
            session.download_token
              ? `
                <a
                  class="btn primary"
                  href="${API_BASE}/download?token=${encodeURIComponent(
                    session.download_token
                  )}"
                >
                  Download ${session.product_name}
                </a>
              `
              : `
                <p>
                  Your download is still being prepared. Refresh this
                  page in a moment.
                </p>
              `
          }

        </div>

        <section class="might-like">

          <h3>You Might Also Like</h3>

          <div id="relatedProducts" class="related-products">
            <p class="loading-text">
              Loading recommendations...
            </p>
          </div>

        </section>
      `;

      loadRelatedProducts(
        session.product_id,
        "digital"
      );
    } catch (err) {
      console.error(err);

      statusEl.textContent =
        "There was a problem verifying your purchase.";
    }
  }

  async function loadRelatedProducts(
    currentProductId,
    productType
  ) {
    const relatedEl = document.getElementById(
      "relatedProducts"
    );

    if (!relatedEl) return;

    const isPhysical = productType === "physical";

    const storeUrl = isPhysical
      ? "physical.html"
      : "ats.html";

    const productPage = isPhysical
      ? "physical-product.html"
      : "skin.html";

    const buttonText = isPhysical
      ? "View Product"
      : "View Skin";

    try {
      const response = await fetch(
        `${API_BASE}/products?type=${encodeURIComponent(
          productType
        )}`
      );

      const products = await response.json();

      if (!response.ok || !Array.isArray(products)) {
        throw new Error("Invalid products response");
      }

      const currentProduct = products.find(
        (product) =>
          String(product.id) ===
          String(currentProductId)
      );

      const otherProducts = products.filter(
        (product) =>
          String(product.id) !==
          String(currentProductId)
      );

      const sameCategory = otherProducts.filter(
        (product) =>
          currentProduct &&
          String(product.category || "").trim() ===
            String(currentProduct.category || "").trim()
      );

      const fallback = otherProducts.filter(
        (product) =>
          !sameCategory.some(
            (match) =>
              String(match.id) === String(product.id)
          )
      );

      const related = [
        ...sameCategory,
        ...fallback
      ].slice(0, 3);

      if (!related.length) {
        relatedEl.innerHTML = `
          <div class="related-card">
            <h4>More products coming soon</h4>

            <p>
              Check back soon for new Kap10's Kustoms releases.
            </p>

            <a class="btn secondary" href="${storeUrl}">
              Browse Store
            </a>
          </div>
        `;

        return;
      }

      relatedEl.innerHTML = related
        .map(
          (product) => `
            <div class="related-card">

              <img
                class="related-image"
                src="${productImage(product)}"
                alt="${product.name}"
              >

              <h4>${product.name}</h4>

              <p>
                ${product.category || "Kap10's Kustoms"}
              </p>

              <p>
                <strong>
                  $${productPrice(product)} USD
                </strong>
              </p>

              <a
                class="btn secondary"
                href="${productPage}?productId=${encodeURIComponent(
                  product.id
                )}"
              >
                ${buttonText}
              </a>

            </div>
          `
        )
        .join("");
    } catch (err) {
      console.error(err);

      relatedEl.innerHTML = `
        <div class="related-card">
          <h4>Browse more products</h4>

          <p>
            See the latest Kap10's Kustoms releases.
          </p>

          <a class="btn secondary" href="${storeUrl}">
            Browse Store
          </a>
        </div>
      `;
    }
  }

  verifyPurchase();
</script>
</body>
</html>
