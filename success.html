<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="success-page success-shell">
    <section class="success-card">
      <div class="success-icon">✓</div>

      <p class="success-eyebrow">Purchase Complete</p>
      <h1>Thank you for supporting Kap10's Kustoms.</h1>

      <p id="purchaseStatus" class="success-status">
        Verifying your payment...
      </p>

      <div id="purchaseDetails" class="success-details"></div>

      <div class="success-actions">
        <a class="btn secondary" href="ats.html">Continue Shopping</a>
        <a class="btn secondary" href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <script>
    async function verifyPurchase() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const statusEl = document.getElementById("purchaseStatus");
      const detailsEl = document.getElementById("purchaseDetails");

      if (!sessionId) {
        statusEl.textContent = "Payment completed, but no session ID was found.";
        return;
      }

      try {
        const response = await fetch(
          `https://kap10skustoms-api.kap10skustoms.workers.dev/checkout-session?session_id=${encodeURIComponent(sessionId)}`
        );

        const data = await response.json();

        if (!data.ok || !data.session) {
          statusEl.textContent = "We could not verify this purchase yet.";
          return;
        }

        const session = data.session;

        if (session.payment_status === "paid") {
          statusEl.textContent = "Your payment has been verified and your download is ready below.";

          detailsEl.innerHTML = `
  <div class="order-summary polished-order-summary">

    <h2>${session.product_name}</h2>

    <p><strong>Email:</strong> ${session.customer_email || "Not provided"}</p>

    <p><strong>Total:</strong>
      $${(session.amount_total / 100).toFixed(2)}
      ${String(session.currency || "usd").toUpperCase()}
    </p>

    <p><strong>Downloads Used:</strong>
      ${session.download_count}
    </p>

    <p><strong>Download Expires:</strong>
      ${new Date(session.download_expires).toLocaleDateString()}
    </p>

    <br>

    <a
      class="btn primary"
      href="https://kap10skustoms-api.kap10skustoms.workers.dev/download?token=${session.download_token}">
      Download ${session.product_name}
    </a>

     </div>

    <section class="might-like">

      <h3>You Might Also Like</h3>

      <div class="related-products">

        <div class="related-card">

          <div class="related-image">
            🚛
          </div>

          <h4>More ATS Skins Coming Soon</h4>

          <p>
            We're hard at work creating more high-quality skins for
            American Truck Simulator.
          </p>

          <a class="btn secondary" href="ats.html">
            Browse ATS Store
          </a>

        </div>

      </div>

    </section>
`;
        } else {
          statusEl.textContent = "Payment was not completed.";
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = "There was a problem verifying your purchase.";
      }
    }

    verifyPurchase();
  </script>
</body>
</html>
