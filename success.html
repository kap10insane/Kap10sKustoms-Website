<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="success-page success-shell">
    <section class="success-card">
      <div class="success-icon">✓</div>

      <p class="success-eyebrow">Purchase Complete</p>
      <h1>Thank you for your purchase!</h1>

      <p id="purchaseStatus" class="success-status">
        Verifying your payment...
      </p>

      <div id="purchaseDetails" class="success-details"></div>

      <div class="success-actions">
        <a class="btn secondary" href="ats.html">Continue Shopping</a>
        <a class="btn secondary" href="index.html">Back Home</a>
      </div>
    </section>
  </main>

  <script>
    async function verifyPurchase() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const statusEl = document.getElementById("purchaseStatus");
      const detailsEl = document.getElementById("purchaseDetails");

      if (!sessionId) {
        statusEl.textContent = "Payment completed, but no session ID was found.";
        return;
      }

      try {
        const response = await fetch(
          `https://kap10skustoms-api.kap10skustoms.workers.dev/checkout-session?session_id=${encodeURIComponent(sessionId)}`
        );

        const data = await response.json();

        if (!data.ok || !data.session) {
          statusEl.textContent = "We could not verify this purchase yet. Please refresh in a moment.";
          return;
        }

        const session = data.session;

        if (session.payment_status === "paid") {
          statusEl.textContent = "Payment verified. Your download is ready.";

          const productName = session.product_name || "Your Download";
          const customerEmail = session.customer_email || "Not provided";
          const total = ((session.amount_total || 0) / 100).toFixed(2);
          const currency = String(session.currency || "usd").toUpperCase();
          const downloadsUsed = session.download_count ?? 0;
          const expires = session.download_expires
            ? new Date(session.download_expires).toLocaleDateString()
            : "Not available";

          detailsEl.innerHTML = `
            <div class="order-summary polished-order-summary">
              <div class="download-header">
                <div class="download-icon">⬇</div>
                <div>
                  <h2>${productName}</h2>
                  <p>Your secure file is ready below.</p>
                </div>
              </div>

              <div class="order-grid">
                <div>
                  <span>Email</span>
                  <strong>${customerEmail}</strong>
                </div>

                <div>
                  <span>Total</span>
                  <strong>$${total} ${currency}</strong>
                </div>

                <div>
                  <span>Downloads Used</span>
                  <strong>${downloadsUsed}</strong>
                </div>

                <div>
                  <span>Download Expires</span>
                  <strong>${expires}</strong>
                </div>
              </div>

              <a
                class="btn primary download-btn"
                href="https://kap10skustoms-api.kap10skustoms.workers.dev/download?token=${session.download_token}">
                Download ${productName}
              </a>

              <p class="download-note">
                Save your file somewhere safe. This download link is secure and time-limited.
              </p>
            </div>

            <section class="might-like">
              <h3>You Might Also Like</h3>
              <p>More ATS skins and Kap10's Kustoms downloads are coming soon.</p>
              <a class="btn secondary" href="ats.html">Browse ATS Products</a>
            </section>
          `;
        } else {
          statusEl.textContent = "Payment was not completed.";
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = "There was a problem verifying your purchase.";
      }
    }

    verifyPurchase();
  </script>
</body>
</html>
