<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="success-page">
    <h1>Thank you for your purchase!</h1>
    <p id="purchaseStatus">Verifying your payment...</p>

    <div id="purchaseDetails"></div>

    <a class="btn primary" href="ats.html">Continue Shopping</a>
  </main>

  <script>
    async function verifyPurchase() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const statusEl = document.getElementById("purchaseStatus");
      const detailsEl = document.getElementById("purchaseDetails");

      if (!sessionId) {
        statusEl.textContent = "Payment completed, but no session ID was found.";
        return;
      }

      try {
        const response = await fetch(
          `https://kap10skustoms-api.kap10skustoms.workers.dev/checkout-session?session_id=${encodeURIComponent(sessionId)}`
        );

        const data = await response.json();

        if (!data.ok || !data.session) {
          statusEl.textContent = "We could not verify this purchase yet.";
          return;
        }

        const session = data.session;

        if (session.payment_status === "paid") {
          statusEl.textContent = "Payment verified. Your order was received.";

          detailsEl.innerHTML = `
            <div class="order-summary">
              <p><strong>Email:</strong> ${session.customer_email || "Not provided"}</p>
              <p><strong>Product:</strong> ${session.product_id || "Unknown product"}</p>
              <p><strong>Total:</strong> $${(session.amount_total / 100).toFixed(2)} ${String(session.currency || "usd").toUpperCase()}</p>
            </div>
          `;
        } else {
          statusEl.textContent = "Payment was not completed.";
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = "There was a problem verifying your purchase.";
      }
    }

    verifyPurchase();
  </script>
</body>
</html>
