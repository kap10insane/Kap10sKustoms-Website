<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Kap10's Kustoms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="header-logo">
    <img src="images/kap10-logo-round.png" alt="Kap10's Kustoms">
  </a>

  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="ats.html">Shop</a>
    <a href="account.html">My Account</a>
  </nav>
</header>

<main class="dashboard-page">
  <section class="dashboard-shell">
    <div class="dashboard-header">
      <div>
        <p class="eyebrow">Account</p>
        <h1>My Account</h1>
      </div>

      <button class="btn secondary" type="button" id="accountLogoutBtn">
        Logout
      </button>
    </div>

   <section class="dashboard-panel">
  <div class="account-summary">
    <h2 id="accountWelcome">Welcome</h2>
    <p id="accountEmail">Loading account...</p>
    <span id="accountRole" class="status-pill active"></span>
  </div>

  <div class="account-actions">
    <a class="account-action-card" href="downloads.html">
      <strong>My Downloads</strong>
      <span>View purchased downloads.</span>
    </a>

    <a class="account-action-card" href="orders.html">
      <strong>Order History</strong>
      <span>Receipts and past purchases.</span>
    </a>
  </div>
</section>
  </section>
</main>

<script src="auth.js"></script>
<script src="account.js"></script>

</body>
</html>
